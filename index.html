<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持倉 — 投資組合損益追蹤面板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --bg-elevated: #131316;
    --card: #17171b;
    --card-hover: #1d1d22;
    --border: #27272e;
    --border-soft: #1e1e24;
    --text: #eceeef;
    --text-dim: #8d8d97;
    --text-faint: #58585f;
    --accent: #c9a86a;
    --up: #e0665c;      /* 預設台股慣例：紅漲 */
    --down: #4ec793;    /* 預設台股慣例：綠跌 */
    --up-bg: rgba(224, 102, 92, 0.10);
    --down-bg: rgba(78, 199, 147, 0.10);
    --radius: 14px;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', 'Inter', sans-serif;
    --body: 'Inter', -apple-system, sans-serif;
  }
  [data-convention="us"] {
    --up: #4ec793;
    --down: #e0665c;
    --up-bg: rgba(78, 199, 147, 0.10);
    --down-bg: rgba(224, 102, 92, 0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,168,106,0.06), transparent),
      radial-gradient(ellipse 700px 400px at 90% 0%, rgba(78,199,147,0.04), transparent);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  a { color: inherit; }

  .shell { max-width: 960px; margin: 0 auto; padding: 0 20px; }

  /* ---------- Header ---------- */
  header.top {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(14px);
    background: rgba(10,10,12,0.72);
    border-bottom: 1px solid var(--border-soft);
  }
  .top-inner {
    max-width: 960px; margin: 0 auto; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .mark {
    font-family: var(--display); font-weight: 700; font-size: 19px; letter-spacing: -0.02em;
  }
  .brand .sub { font-size: 12px; color: var(--text-faint); font-family: var(--mono); letter-spacing: 0.04em; }
  .top-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
    width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s ease;
  }
  .icon-btn:hover { background: var(--card-hover); color: var(--text); border-color: #35353c; }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Hero ---------- */
  .hero {
    padding: 40px 0 28px;
    display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 28px;
  }
  .hero-block .label {
    font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }
  .hero-block .num {
    font-family: var(--mono); font-weight: 600; font-size: 34px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }
  .hero-block.total .num { font-size: 40px; }
  .hero-block .sub-num {
    font-family: var(--mono); font-size: 14px; margin-top: 6px; font-variant-numeric: tabular-nums;
  }
  .pos { color: var(--up); } .neg { color: var(--down); } .flat { color: var(--text-dim); }
  .pos-bg { background: var(--up-bg); } .neg-bg { background: var(--down-bg); }

  @media (max-width: 640px) {
    .hero { grid-template-columns: 1fr; gap: 18px; padding: 28px 0 20px; }
    .hero-block.total .num { font-size: 32px; }
  }

  /* ---------- Add form ---------- */
  .panel {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 20px;
  }
  .panel-title {
    font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 14px; letter-spacing: 0.01em;
  }
  .form-grid {
    display: grid; grid-template-columns: 1.1fr 1.3fr 1fr auto; gap: 10px; align-items: end;
  }
  .field label {
    display: block; font-size: 11px; color: var(--text-faint); margin-bottom: 6px; letter-spacing: 0.03em;
  }
  .field input, .field select {
    width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 9px; font-size: 14px; font-family: var(--body); outline: none;
    transition: border-color .15s ease;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .qty-group { display: flex; gap: 6px; }
  .qty-group input { flex: 1.4; }
  .qty-group select { flex: 1; }
  .btn-primary {
    background: var(--accent); color: #16130a; border: none; padding: 10px 20px; border-radius: 9px;
    font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; font-family: var(--body);
    transition: filter .15s ease, transform .1s ease;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:active { transform: scale(0.98); }
  .hint { font-size: 12px; color: var(--text-faint); margin-top: 10px; line-height: 1.6; }
  .market-tag {
    display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 5px;
    border: 1px solid var(--border); color: var(--text-dim); margin-left: 8px; vertical-align: middle;
  }

  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid .btn-primary { grid-column: 1 / -1; }
  }

  /* ---------- Holdings list ---------- */
  .list-head {
    display: grid; grid-template-columns: 1.4fr 0.9fr 1fr 1fr 1fr 1.1fr 36px;
    padding: 0 18px 10px; font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .holding {
    display: grid; grid-template-columns: 1.4fr 0.9fr 1fr 1fr 1fr 1.1fr 36px;
    align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 10px; transition: background .15s ease, border-color .15s ease;
  }
  .holding:hover { background: var(--card-hover); border-color: #33333a; }
  .h-symbol { display: flex; flex-direction: column; gap: 3px; }
  .h-symbol .code { font-family: var(--display); font-weight: 600; font-size: 15px; }
  .h-symbol .meta { font-size: 11px; color: var(--text-faint); font-family: var(--mono); }
  .h-cell { font-family: var(--mono); font-size: 13.5px; font-variant-numeric: tabular-nums; color: var(--text); }
  .h-cell .cell-label { display: none; }
  .h-pnl { display: flex; flex-direction: column; gap: 2px; }
  .h-pnl .amt { font-family: var(--mono); font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; }
  .h-pnl .pct { font-family: var(--mono); font-size: 11.5px; }
  .del-btn {
    background: none; border: none; color: var(--text-faint); cursor: pointer; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all .15s ease;
    justify-self: end;
  }
  .del-btn:hover { background: rgba(224,102,92,0.12); color: var(--up); }
  .del-btn svg { width: 15px; height: 15px; }

  @media (max-width: 780px) {
    .list-head { display: none; }
    .holding {
      grid-template-columns: 1fr 1fr; grid-template-areas:
        "sym sym"
        "qty price"
        "cost value"
        "pnl del";
      row-gap: 10px;
    }
    .h-symbol { grid-area: sym; }
    .holding > .h-cell:nth-of-type(1) { grid-area: qty; }
    .holding > .h-cell:nth-of-type(2) { grid-area: price; }
    .holding > .h-cell:nth-of-type(3) { grid-area: cost; }
    .holding > .h-cell:nth-of-type(4) { grid-area: value; }
    .h-pnl { grid-area: pnl; }
    .del-btn { grid-area: del; }
    .h-cell .cell-label { display: block; font-size: 10px; color: var(--text-faint); text-transform: uppercase; margin-bottom: 3px; letter-spacing: 0.05em; }
  }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-faint);
  }
  .empty svg { width: 40px; height: 40px; margin-bottom: 14px; opacity: 0.5; }
  .empty p { font-size: 14px; }

  .footer-actions {
    display: flex; justify-content: center; gap: 10px; margin-top: 28px;
  }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 9px 16px; border-radius: 9px; font-size: 13px; cursor: pointer; font-family: var(--body);
    display: flex; align-items: center; gap: 7px; transition: all .15s ease;
  }
  .btn-ghost:hover { border-color: #3a3a42; color: var(--text); background: var(--card); }
  .btn-ghost svg { width: 14px; height: 14px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 12px 20px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all .25s ease;
    pointer-events: none; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .last-updated { text-align: center; font-size: 11.5px; color: var(--text-faint); margin-top: 16px; font-family: var(--mono); }
</style>
</head>
<body data-convention="tw">

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="mark">持倉</span>
      <span class="sub">PORTFOLIO — TW / US</span>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="btnConvention" title="切換漲跌配色慣例">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
      </button>
      <button class="icon-btn" id="btnRefresh" title="重新整理報價">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.36-3.36L23 10M1 14l5.13 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="shell">

  <section class="hero">
    <div class="hero-block total">
      <div class="label">總市值</div>
      <div class="num" id="totalValue">$0</div>
      <div class="sub-num flat" id="totalCostLine">成本 $0</div>
    </div>
    <div class="hero-block">
      <div class="label">總損益</div>
      <div class="num flat" id="totalPnl">$0</div>
      <div class="sub-num flat" id="totalPnlPct">0.00%</div>
    </div>
    <div class="hero-block">
      <div class="label">持股檔數</div>
      <div class="num" id="totalCount" style="color:var(--text-dim)">0</div>
      <div class="sub-num flat">&nbsp;</div>
    </div>
  </section>

  <div class="panel">
    <div class="panel-title">新增持股</div>
    <div class="form-grid">
      <div class="field">
        <label for="inSymbol">代碼</label>
        <input type="text" id="inSymbol" placeholder="例如 2330.TW 或 AAPL" autocomplete="off">
      </div>
      <div class="field">
        <label for="inQty">數量</label>
        <div class="qty-group">
          <input type="number" id="inQty" placeholder="0" min="0" step="any">
          <select id="inUnit">
            <option value="share">股</option>
            <option value="lot">張 (=1000股)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="inCost">平均成本 / 股</label>
        <input type="number" id="inCost" placeholder="0.00" min="0" step="any">
      </div>
      <button class="btn-primary" id="btnAdd">加入</button>
    </div>
    <div class="hint" id="marketHint">代碼含 <code>.TW</code> / <code>.TWO</code> 視為台股（買進計 0.1425% 手續費，最低 20 元；市值計算扣除 0.1425% 手續費［最低 20 元］＋0.3% 證交稅）；其餘視為美股（不計手續費與稅金）。也可直接輸入純數字代碼（如 2330）或常見中文簡稱（如台積電）。</div>
  </div>

  <div class="list-head">
    <div>代碼</div><div>數量</div><div>成本</div><div>現價</div><div>市值</div><div>損益</div><div></div>
  </div>

  <div id="holdingsList"></div>

  <div class="empty" id="emptyState" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18M7 14l4-4 4 4 5-6"/></svg>
    <p>尚未新增任何持股，從上方開始建立你的投資組合。</p>
  </div>

  <div class="footer-actions">
    <button class="btn-ghost" id="btnExport">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      匯出 JSON
    </button>
    <button class="btn-ghost" id="btnImport">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      匯入 JSON
    </button>
    <input type="file" id="fileImport" accept="application/json" style="display:none">
  </div>

  <div class="last-updated" id="lastUpdated"></div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "portfolio_tracker_v1";
  const CONVENTION_KEY = "portfolio_tracker_convention";
  const TW_BUY_FEE = 0.001425;
  const TW_SELL_FEE = 0.001425;
  const TW_TAX = 0.003;
  const TW_MIN_FEE = 20; // 台股券商常見最低手續費（新台幣）

  // 常見台股個股與 ETF 中文名稱 → 代碼對照，供離線快速比對（未收錄的名稱會在加入時自動連線查詢）
  const TW_NAME_MAP = {
    "台積電": "2330.TW", "台积电": "2330.TW",
    "鴻海": "2317.TW", "鸿海": "2317.TW",

    "中信金": "2891.TW",
    "台塑": "1301.TW",
    "南亞": "1303.TW", "南亚": "1303.TW",

    "大立光": "3008.TW",

    "台新金": "2887.TW",

    "永豐金": "2890.TW",

    "開發金": "2883.TW",
    "新光金": "2888.TW",
    "元大金": "2885.TW",
    "台灣大": "3045.TW",
    "遠傳": "4904.TW",
    "廣達": "2382.TW",
    "緯創": "3231.TW",
    "和碩": "4938.TW",

    "英業達": "2356.TW",
    "技嘉": "2376.TW",
    "微星": "2377.TW",
    "華碩": "2357.TW",

    "聯電": "2303.TW", "联电": "2303.TW",
    "群創": "3481.TW",
    "友達": "2409.TW",
    "長榮": "2603.TW",
    "陽明": "2609.TW",
    "萬海": "2615.TW",
    "中鴻": "2014.TW",
    "南亞科": "2408.TW",
    "京元電子": "2449.TW",
    "旺宏": "2337.TW",
    "世芯-KY": "3661.TW",
    "創見": "2451.TW",
    "上緯投控": "3708.TW",
    "元大台灣50": "0050.TW", "元大台湾50": "0050.TW",
    "元大台灣50反1": "00632R.TW",
    "元大高股息": "0056.TW",
    "國泰永續高股息": "00878.TW",
    "富邦台50": "006208.TW",
    "復華台灣科技優息": "00929.TW",
    "群益台灣精選高息": "00919.TW",
    "元大台灣high dividend低波動": "00713.TW",
    "國泰台灣科技龍頭": "00881.TW",
    "富邦公司治理": "00692.TW",
    "元大MSCI台灣": "006203.TW",
    "永豐台灣加權": "006204.TW",
    "中信中國高股息": "00882.TW",
    "元大美債20年": "00679B.TW",
    "國泰20年美債": "00687B.TW",
    "凱基優選高股息30": "00915.TW",
    "野村台灣趨勢": "00668.TW",
    "元大電子": "0053.TW",
    "富邦科技": "0052.TW"
  };

  // 名稱正規化：統一「臺／台」異體字、去除全形/半形空白，避免因輸入法選字差異導致比對不到
  function normalizeName(s) {
    return (s || "").trim().replace(/臺/g, "台").replace(/\s+/g, "");
  }
  const TW_NAME_MAP_NORM = {};
  Object.keys(TW_NAME_MAP).forEach(k => { TW_NAME_MAP_NORM[normalizeName(k)] = TW_NAME_MAP[k]; });

  function lookupNameMap(raw) {
    return TW_NAME_MAP_NORM[normalizeName(raw)] || null;
  }

  function resolveSymbol(raw) {
    const trimmed = raw.trim();
    const mapped = lookupNameMap(trimmed);
    if (mapped) return mapped;
    if (/^\d{4,6}[A-Z]?$/.test(trimmed)) return trimmed + ".TW"; // 純數字（或數字+一碼字母，如可轉債）視為台股代碼，自動補 .TW
    return trimmed.toUpperCase();
  }

  function hasCJK(str) {
    return /[\u3400-\u9FFF]/.test(str);
  }

  // 多組公開 CORS 代理，依序嘗試，其中一組失效時自動改用下一組，提升在 GitHub Pages 上的穩定度
  const CORS_PROXIES = [
    (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
    (u) => "https://corsproxy.io/?url=" + encodeURIComponent(u),
    (u) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u)
  ];

  async function proxyFetchJson(targetUrl) {
    let lastErr = new Error("no proxy attempted");
    for (const buildProxyUrl of CORS_PROXIES) {
      try {
        const res = await fetch(buildProxyUrl(targetUrl), { cache: "no-store" });
        if (!res.ok) { lastErr = new Error("HTTP " + res.status); continue; }
        const data = await res.json();
        return data;
      } catch (e) {
        lastErr = e;
        continue;
      }
    }
    throw lastErr;
  }

  // 透過 Yahoo Finance 搜尋 API，將任意中文名稱（包含未收錄於內建對照表的個股或 ETF）解析成代碼
  async function searchSymbolByName(query) {
    const searchUrl = "https://query1.finance.yahoo.com/v1/finance/search?q=" + encodeURIComponent(query) + "&quotesCount=8&newsCount=0&lang=zh-TW&region=TW";
    const data = await proxyFetchJson(searchUrl);
    const quotes = (data && data.quotes) || [];
    if (quotes.length === 0) return null;
    // 優先挑選台灣證交所(TAI)或櫃買中心(TWO)的股票／ETF
    const preferred = quotes.find(q => (q.exchange === "TAI" || q.exchange === "TWO") && (q.quoteType === "EQUITY" || q.quoteType === "ETF"));
    const best = preferred || quotes[0];
    if (!best || !best.symbol) return null;
    return { symbol: best.symbol.toUpperCase(), name: best.shortname || best.longname || best.symbol };
  }

  // 完整解析流程：內建對照表 → 純數字代碼 → 純英數代碼 → 線上以名稱搜尋（非同步）
  async function resolveSymbolAsync(raw) {
    const trimmed = raw.trim();
    const mapped = lookupNameMap(trimmed);
    if (mapped) return { symbol: mapped, name: trimmed };
    if (/^\d{4,6}[A-Z]?$/.test(trimmed)) return { symbol: trimmed + ".TW", name: null };
    if (!hasCJK(trimmed)) return { symbol: trimmed.toUpperCase(), name: null };
    // 含中文但不在內建對照表中，線上查詢
    try {
      const found = await searchSymbolByName(trimmed);
      return found; // 可能為 null
    } catch (e) {
      console.error("resolveSymbolAsync failed:", e);
      return null;
    }
  }

  let portfolio = [];
  let lastFetch = null;

  const el = (id) => document.getElementById(id);
  const fmtMoney = (n, decimals = 2) => {
    const sign = n < 0 ? "-" : "";
    const v = Math.abs(n);
    return sign + "$" + v.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  };
  const fmtPct = (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
  const isTW = (symbol) => /\.(TW|TWO)$/i.test(symbol.trim());

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      portfolio = raw ? JSON.parse(raw) : [];
    } catch (e) { portfolio = []; }
    const conv = localStorage.getItem(CONVENTION_KEY) || "tw";
    document.body.setAttribute("data-convention", conv);
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolio));
  }

  function toast(msg, durationMs = 2400) {
    const t = el("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => t.classList.remove("show"), durationMs);
  }

  // ---------- 計算邏輯 ----------
  function computeHolding(h) {
    const shares = h.shares;
    const tw = isTW(h.symbol);
    const grossCost = shares * h.avgCost;
    const buyFee = tw ? Math.max(grossCost * TW_BUY_FEE, TW_MIN_FEE) : 0;
    const cost = grossCost + buyFee;

    let currentValue = null, pnl = null, pnlPct = null;
    if (typeof h.price === "number") {
      const grossValue = shares * h.price;
      const sellFee = tw ? Math.max(grossValue * TW_SELL_FEE, TW_MIN_FEE) : 0;
      const tax = tw ? grossValue * TW_TAX : 0;
      currentValue = grossValue - sellFee - tax;
      pnl = currentValue - cost;
      pnlPct = cost !== 0 ? (pnl / cost) * 100 : 0;
    }
    return { tw, cost, currentValue, pnl, pnlPct };
  }

  function renderTotals() {
    let totalCost = 0, totalValue = 0, hasPrice = false;
    portfolio.forEach(h => {
      const c = computeHolding(h);
      totalCost += c.cost;
      if (c.currentValue !== null) { totalValue += c.currentValue; hasPrice = true; }
    });
    const totalPnl = totalValue - totalCost;
    const totalPnlPct = totalCost !== 0 ? (totalPnl / totalCost) * 100 : 0;

    el("totalValue").textContent = hasPrice ? fmtMoney(totalValue, 0) : "—";
    el("totalCostLine").textContent = "成本 " + fmtMoney(totalCost, 0);
    el("totalCount").textContent = portfolio.length;

    const pnlEl = el("totalPnl");
    const pctEl = el("totalPnlPct");
    pnlEl.textContent = hasPrice ? fmtMoney(totalPnl, 0) : "—";
    pctEl.textContent = hasPrice ? fmtPct(totalPnlPct) : "尚未取得報價";
    [pnlEl, pctEl].forEach(e => e.classList.remove("pos", "neg", "flat"));
    const cls = !hasPrice ? "flat" : (totalPnl > 0 ? "pos" : totalPnl < 0 ? "neg" : "flat");
    pnlEl.classList.add(cls);
    pctEl.classList.add(cls);
  }

  function iconTrash() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>';
  }

  function renderList() {
    const list = el("holdingsList");
    const empty = el("emptyState");
    list.innerHTML = "";
    if (portfolio.length === 0) {
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    portfolio.forEach((h) => {
      const c = computeHolding(h);
      const row = document.createElement("div");
      row.className = "holding";

      const priceStr = typeof h.price === "number" ? fmtMoney(h.price, 2) : "—";
      const valueStr = c.currentValue !== null ? fmtMoney(c.currentValue, 0) : "—";
      const pnlCls = c.pnl === null ? "flat" : (c.pnl > 0 ? "pos" : c.pnl < 0 ? "neg" : "flat");
      const pnlStr = c.pnl !== null ? fmtMoney(c.pnl, 0) : "—";
      const pnlPctStr = c.pnlPct !== null ? fmtPct(c.pnlPct) : "";

      const lots = h.shares / 1000;
      const qtyDisplay = (h.shares % 1000 === 0 && h.shares >= 1000)
        ? lots + " 張"
        : h.shares.toLocaleString("en-US") + " 股";

      row.innerHTML = `
        <div class="h-symbol">
          <span class="code">${h.symbol}${c.tw ? '<span class="market-tag">TW</span>' : '<span class="market-tag">US</span>'}</span>
          <span class="meta">${h.name ? h.name + "　" : ""}${h.updatedAt ? "更新於 " + h.updatedAt : "尚未更新報價"}</span>
        </div>
        <div class="h-cell"><span class="cell-label">數量</span>${qtyDisplay}</div>
        <div class="h-cell"><span class="cell-label">成本/股</span>${fmtMoney(h.avgCost, 2)}</div>
        <div class="h-cell"><span class="cell-label">現價</span>${priceStr}</div>
        <div class="h-cell"><span class="cell-label">市值</span>${valueStr}</div>
        <div class="h-pnl">
          <span class="amt ${pnlCls}">${pnlStr}</span>
          <span class="pct ${pnlCls}">${pnlPctStr}</span>
        </div>
        <button class="del-btn" data-id="${h.id}" title="刪除">${iconTrash()}</button>
      `;
      list.appendChild(row);
    });

    list.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        portfolio = portfolio.filter(h => h.id !== id);
        save(); renderAll();
        toast("已刪除持股");
      });
    });
  }

  function renderLastUpdated() {
    el("lastUpdated").textContent = lastFetch ? ("報價最後更新：" + lastFetch) : "";
  }

  function renderAll() {
    renderTotals();
    renderList();
    renderLastUpdated();
  }

  // ---------- 報價抓取 ----------
  async function fetchPrice(symbol) {
    const yahooUrl = "https://query1.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(symbol) + "?interval=1d&range=1d";
    const data = await proxyFetchJson(yahooUrl);
    const result = data && data.chart && data.chart.result && data.chart.result[0];
    if (!result || !result.meta) throw new Error("no data");
    const price = result.meta.regularMarketPrice;
    if (typeof price !== "number") throw new Error("no price");
    return price;
  }

  async function refreshAll() {
    if (portfolio.length === 0) { toast("尚無持股可更新"); return; }
    const btn = el("btnRefresh");
    btn.classList.add("spinning");
    const now = new Date();
    const stamp = now.toLocaleString("zh-TW", { hour12: false });
    let okCount = 0, failCount = 0;

    await Promise.all(portfolio.map(async (h) => {
      try {
        const price = await fetchPrice(h.symbol);
        h.price = price;
        h.updatedAt = now.toLocaleTimeString("zh-TW", { hour12: false });
        okCount++;
      } catch (e) {
        failCount++;
      }
    }));

    save();
    lastFetch = stamp;
    renderAll();
    btn.classList.remove("spinning");
    if (failCount === 0) toast(`已更新 ${okCount} 檔報價`);
    else toast(`更新完成：成功 ${okCount} 檔，失敗 ${failCount} 檔`);
  }

  // ---------- 新增持股 ----------
  async function addHolding() {
    const symbolRaw = el("inSymbol").value.trim();
    const qtyRaw = parseFloat(el("inQty").value);
    const unit = el("inUnit").value;
    const costRaw = parseFloat(el("inCost").value);

    if (!symbolRaw) { toast("請輸入股票代碼"); return; }
    if (!qtyRaw || qtyRaw <= 0) { toast("請輸入有效數量"); return; }
    if (!(costRaw >= 0)) { toast("請輸入有效的平均成本"); return; }

    const shares = unit === "lot" ? qtyRaw * 1000 : qtyRaw;
    const addBtn = el("btnAdd");
    const needsOnlineLookup = hasCJK(symbolRaw) && !lookupNameMap(symbolRaw);

    try {
      let resolved;
      if (needsOnlineLookup) {
        addBtn.disabled = true;
        toast(`正在查詢「${symbolRaw}」對應的股票代碼…`);
        resolved = await resolveSymbolAsync(symbolRaw);
      } else {
        resolved = await resolveSymbolAsync(symbolRaw);
      }

      if (!resolved || !resolved.symbol) {
        toast(`找不到「${symbolRaw}」對應的股票代碼，請確認名稱是否正確，或改用數字代碼（如 2330）新增`, 4500);
        return;
      }
      const symbol = resolved.symbol;
      const displayName = resolved.name;

      portfolio.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
        symbol,
        name: displayName,
        shares,
        avgCost: costRaw,
        price: null,
        updatedAt: null
      });

      save();
      renderAll();
      el("inSymbol").value = "";
      el("inQty").value = "";
      el("inCost").value = "";
      el("inSymbol").focus();
      toast(displayName ? `已新增 ${symbol}（${displayName}）` : `已新增 ${symbol}`);
      fetchPrice(symbol).then(price => {
        const target = portfolio.find(h => h.symbol === symbol && h.price === null);
        if (target) {
          target.price = price;
          target.updatedAt = new Date().toLocaleTimeString("zh-TW", { hour12: false });
          save(); renderAll();
        }
      }).catch(() => {
        toast(`${symbol} 目前抓不到報價，請確認代碼是否正確（可稍後按重新整理再試一次）`);
      });
    } catch (err) {
      console.error("addHolding failed:", err);
      toast("新增時發生非預期錯誤，請稍後再試一次", 4500);
    } finally {
      addBtn.disabled = false;
    }
  }

  // ---------- 匯出 / 匯入 ----------
  function exportData() {
    const blob = new Blob([JSON.stringify(portfolio, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "portfolio-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast("已匯出 JSON 檔案");
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!Array.isArray(parsed)) throw new Error("format");
        portfolio = parsed.map(h => ({
          id: h.id || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
          symbol: (h.symbol || "").toUpperCase(),
          name: h.name || null,
          shares: Number(h.shares) || 0,
          avgCost: Number(h.avgCost) || 0,
          price: typeof h.price === "number" ? h.price : null,
          updatedAt: h.updatedAt || null
        }));
        save();
        renderAll();
        toast(`已匯入 ${portfolio.length} 檔持股`);
      } catch (err) {
        toast("匯入失敗，請確認檔案格式");
      }
    };
    reader.readAsText(file);
  }

  // ---------- 事件綁定 ----------
  el("btnAdd").addEventListener("click", addHolding);
  el("inSymbol").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) addHolding(); });
  el("inCost").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) addHolding(); });
  el("btnRefresh").addEventListener("click", refreshAll);
  el("btnExport").addEventListener("click", exportData);
  el("btnImport").addEventListener("click", () => el("fileImport").click());
  el("fileImport").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) importData(e.target.files[0]);
    e.target.value = "";
  });
  el("btnConvention").addEventListener("click", () => {
    const cur = document.body.getAttribute("data-convention");
    const next = cur === "tw" ? "us" : "tw";
    document.body.setAttribute("data-convention", next);
    localStorage.setItem(CONVENTION_KEY, next);
    toast(next === "tw" ? "配色：紅漲綠跌（台股慣例）" : "配色：綠漲紅跌（歐美慣例）");
  });
  el("inSymbol").addEventListener("input", () => {
    const v = el("inSymbol").value.trim();
    if (!v) { el("marketHint").innerHTML = '代碼含 <code>.TW</code> / <code>.TWO</code> 視為台股（買進計 0.1425% 手續費，最低 20 元；市值計算扣除 0.1425% 手續費［最低 20 元］＋0.3% 證交稅）；其餘視為美股（不計手續費與稅金）。也可直接輸入純數字代碼（如 2330）、內建常見中文簡稱（如台積電、0050），或任何台股中文名稱（新增時會自動線上查詢代碼）。'; return; }

    if (hasCJK(v) && !lookupNameMap(v)) {
      el("marketHint").innerHTML = `偵測為中文名稱，未收錄於內建對照表：按下「加入」時會自動線上查詢 <strong>${v}</strong> 對應的股票代碼（台股買進計 0.1425% 手續費［最低 20 元］；市值扣除 0.1425% 手續費［最低 20 元］＋0.3% 證交稅）。`;
      return;
    }
    const resolved = resolveSymbol(v);
    const tw = isTW(resolved);
    const resolvedNote = resolved !== v.toUpperCase() ? `（將以 <strong>${resolved}</strong> 查詢）` : "";
    el("marketHint").innerHTML = tw
      ? `偵測為 <strong>台股</strong>${resolvedNote}：買進成本加計 0.1425% 手續費（最低 20 元）；市值扣除 0.1425% 手續費（最低 20 元）＋0.3% 證交稅。`
      : `偵測為 <strong>美股</strong>${resolvedNote}：不計手續費與稅金。`;
  });

  // ---------- 初始化 ----------
  load();
  renderAll();
  if (portfolio.length > 0) refreshAll();
})();
</script>
</body>
</html>
